apiVersion: orchestration.hiro.io/v1alpha1
kind: OrchestrationProfile
metadata:
  labels:
    app.kubernetes.io/name: hiro-adaptive-orchestrator
    app.kubernetes.io/managed-by: kustomize
  name: orchestrationprofile-error
spec:
  # TODO(user): Add fields here
  applicationRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-deployment-error # Non-existent deployment to trigger error status
    namespace: default

  placement:
    # Balanced/Packed/Spread
    strategy: DummyStrategy # Invalid strategy to trigger error status
    awareness:
      cpu: true
  #     memory: false
  #     gpu: false
  #     energy: true

  # rebalancing:
  #   enabled: true
  #   cooldownSeconds: 300
  #   # EnergyThreshold/CPUThreshold/MemoryThreshold/NodeFailure/Scheduled
  #   triggerConditions:
  #     - "EnergyThreshold"
