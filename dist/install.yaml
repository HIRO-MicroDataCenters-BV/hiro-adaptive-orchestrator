                      type: object
                    type: array
                  readyPods:
                    type: integer
                  strategy:
                    type: string
                type: object
              reason:
                description: reason provides additional details when the status is
                  not "Active" (e.g., error messages).
                type: string
              rebalancingStatus:
                description: rebalancingStatus provides details about the current
                  rebalancing state of the application.
                properties:
                  lastTriggeredAt:
                    type: string
                  reason:
                    type: string
                type: object
              status:
                description: status indicates the status of the orchestration profile
                  (e.g., "Pending", "Active", "Error", "InUse").
                type: string
