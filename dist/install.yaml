---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: hiro-adaptive-orchestrator
    control-plane: controller-manager
  name: hiro-adaptive-orchestrator-controller-manager
  namespace: hiro-adaptive-orchestrator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hiro-adaptive-orchestrator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: hiro-adaptive-orchestrator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: DECISION_AGENT_URL
          value: http://decision-agent:8080
        - name: DECISION_AGENT_PATH
          value: /api/v1/agent/placement/decision
        - name: PLACEMENT_SERVER_PORT
          value: :8090
        - name: PLACEMENT_SERVER_PATH
          value: /api/v1/placement/decision
        - name: PLACEMENT_SERVER_HEALTH_PATH
          value: /healthz
        - name: EAO_GROUP
          value: eas.hiro.io
        - name: EAO_VERSION
          value: v1
        - name: EAO_KIND
          value: EnergyAwareOrchestration
        image: ghcr.io/hiro-microdatacenters-bv/hiro-adaptive-orchestrator/hiro-adaptive-orchestrator-controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8090
          name: placement-srv
          protocol: TCP
        - containerPort: 8081
          name: health-probe
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: hiro-adaptive-orchestrator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
