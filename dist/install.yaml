            properties:
              lastUpdatedTime:
                format: date-time
                type: string
              placementStatus:
                description: placementStatus provides details about the current placement
                  of the application.
                properties:
                  failedPods:
                    type: integer
                  observedPods:
                    type: integer
                  pendingPods:
                    type: integer
                  podStatuses:
                    items:
