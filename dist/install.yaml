                properties:
                  awareness:
                    description: Placement Awareness
                    properties:
                      cpu:
                        type: boolean
                      energy:
                        type: boolean
                      gpu:
                        type: boolean
                      memory:
                        type: boolean
                    type: object
                  strategy:
                    type: string
                required:
